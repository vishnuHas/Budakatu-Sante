<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Budakattu-Sante - Onboarding 3</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600;700&amp;family=Manrope:wght@400&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#ffffff",
                        "on-tertiary-fixed-variant": "#544600",
                        "surface": "transparent",
                        "on-primary-fixed": "#1a1c1c",
                        "tertiary": "#705d00",
                        "on-tertiary-fixed": "#221b00",
                        "on-secondary-fixed": "#00210c",
                        "surface-container-high": "transparent",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#00743a",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#ffffff",
                        "inverse-on-surface": "transparent",
                        "outline": "#747878",
                        "on-background": "#161c22",
                        "error": "#ba1a1a",
                        "surface-container-low": "transparent",
                        "on-primary-fixed-variant": "#454747",
                        "primary": "#5d5f5f",
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#8b7400",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#5d5f5f",
                        "secondary": "#006d36",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#e9c400",
                        "secondary-container": "#83fba5",
                        "primary-fixed": "#e2e2e2",
                        "outline-variant": "#c4c7c8",
                        "tertiary-fixed": "#ffe16d",
                        "surface-container": "transparent",
                        "on-surface": "#161c22",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-dim": "transparent",
                        "primary-fixed-dim": "#c6c6c7",
                        "on-surface-variant": "#444748",
                        "surface-bright": "transparent",
                        "secondary-fixed": "#83fba5",
                        "on-primary-container": "#747676",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "unit": "8px",
                        "section-gap": "48px",
                        "container-margin": "24px",
                        "card-padding": "20px"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "h2": ["Epilogue"],
                        "price-display": ["Space Grotesk"],
                        "body-lg": ["Manrope"],
                        "h1": ["Epilogue"],
                        "label-caps": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "h2": ["28px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "price-display": ["24px", { "lineHeight": "1", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1": ["40px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        html, body { background-color: #ffffff !important; background: #ffffff !important; }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.5), 0 40px 40px rgba(0, 109, 54, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(0, 109, 54, 0.3);
        }
        .btn-glow {
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3), 0 8px 20px rgba(0, 109, 54, 0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-glow:hover {
            transform: scale(1.02);
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3), 0 12px 28px rgba(0, 109, 54, 0.35);
        }
        .btn-glow:active {
            transform: scale(0.98);
        }

        body {
            min-height: 100dvh;
        }

        /* Entry Animations */
        @keyframes fadeInUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes pageFadeOutLeft {
            0% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(-20px); }
        }
        @keyframes pageFadeOutRight {
            0% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(20px); }
        }

        .animate-fade-in-up-1 {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in-up-2 {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
            opacity: 0;
        }
        .animate-fade-in-up-3 {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            opacity: 0;
        }

        .animate-exit-left {
            animation: pageFadeOutLeft 0.5s cubic-bezier(0.7, 0, 0.84, 0) forwards;
        }
        .animate-exit-right {
            animation: pageFadeOutRight 0.5s cubic-bezier(0.7, 0, 0.84, 0) forwards;
        }

        /* Orb Floating & Core Glowing Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        @keyframes pulseCore {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }
        @keyframes pulseNode {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(0,109,54,0.1); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(0,109,54,0.3); }
        }
        @keyframes dash {
            to {
                stroke-dashoffset: -20;
            }
        }

        .animate-float-1 { animation: float 5s ease-in-out infinite; }
        .animate-float-2 { animation: float 4s ease-in-out infinite 0.5s; }
        .animate-float-3 { animation: float 4.5s ease-in-out infinite 1s; }
        
        .animate-pulse-core { animation: pulseCore 3s ease-in-out infinite; }
        .animate-pulse-node { animation: pulseNode 2.5s ease-in-out infinite; }
        
        .dash-flow {
            stroke-dasharray: 6 6;
            animation: dash 1.5s linear infinite;
        }
    </style>
    <script src="i18n.js" defer></script>    <script src="device-lock.js" defer></script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col justify-between overflow-hidden relative selection:bg-secondary-container selection:text-on-secondary-container select-none">
    <!-- Abstract Forest/Cloud Background -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-secondary-fixed/20 blur-[120px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[70%] h-[70%] rounded-full bg-surface-container-highest/40 blur-[100px]"></div>
        <div class="absolute top-[40%] left-[20%] w-[40%] h-[40%] rounded-full bg-tertiary-fixed/10 blur-[80px]"></div>
    </div>

    <!-- Top App Bar (Minimalist Back Button for flow) -->
    <header class="w-full px-container-margin py-6 flex items-center justify-start z-50 animate-fade-in-up-1">
        <button id="btn-back" class="w-12 h-12 rounded-full glass-card flex items-center justify-center text-secondary hover:scale-105 active:scale-95 transition-all duration-300">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
        </button>
    </header>

    <!-- Main Content Canvas -->
    <main class="relative z-10 flex flex-col items-center justify-center flex-grow px-container-margin pb-8 max-w-md mx-auto w-full">
        <!-- Illustration / Visualization Area -->
        <div class="w-full flex-grow flex items-center justify-center mb-8 relative animate-fade-in-up-2">
            <!-- Central Glass Orb/Sync Visualization -->
            <div class="glass-card w-64 h-64 rounded-full flex flex-col items-center justify-center relative overflow-hidden">
                <!-- Inner Glowing Core -->
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-32 h-32 rounded-full bg-secondary-container/40 blur-[25px] mix-blend-multiply animate-pulse-core"></div>
                </div>
                
                <!-- Sync Nodes -->
                <div class="relative z-10 w-full h-full flex items-center justify-center">
                    <!-- Center Node -->
                    <div class="w-16 h-16 rounded-full bg-white/80 backdrop-blur-md shadow-[0_0_30px_rgba(0,109,54,0.3)] flex items-center justify-center border border-white/50 z-20 animate-pulse-node">
                        <span class="material-symbols-outlined text-[32px] text-secondary" style="font-variation-settings: 'FILL' 1;">cloud_sync</span>
                    </div>
                    
                    <!-- Orbiting Nodes -->
                    <div class="absolute top-8 left-12 w-10 h-10 rounded-full glass-card flex items-center justify-center animate-float-1 hover:scale-110">
                        <span class="material-symbols-outlined text-[20px] text-primary" style="font-variation-settings: 'FILL' 0;">smartphone</span>
                    </div>
                    <div class="absolute bottom-10 right-8 w-12 h-12 rounded-full glass-card flex items-center justify-center animate-float-2 hover:scale-110">
                        <span class="material-symbols-outlined text-[24px] text-tertiary" style="font-variation-settings: 'FILL' 0;">database</span>
                    </div>
                    <div class="absolute top-16 right-12 w-8 h-8 rounded-full glass-card flex items-center justify-center animate-float-3 hover:scale-110">
                        <span class="material-symbols-outlined text-[16px] text-secondary" style="font-variation-settings: 'FILL' 1;">eco</span>
                    </div>
                    
                    <!-- Connection Lines (SVG) -->
                    <svg class="absolute inset-0 w-full h-full pointer-events-none z-0" viewbox="0 0 256 256">
                        <path class="dash-flow" d="M128 128 L 68 52" fill="none" stroke="rgba(0, 109, 54, 0.3)" stroke-width="2"></path>
                        <path class="dash-flow" d="M128 128 L 216 206" fill="none" stroke="rgba(0, 109, 54, 0.3)" stroke-width="2"></path>
                        <path class="dash-flow" d="M128 128 L 204 80" fill="none" stroke="rgba(0, 109, 54, 0.3)" stroke-width="2"></path>
                    </svg>
                </div>
            </div>

            <!-- Floating Data Chips -->
            <div class="absolute top-[10%] left-0 px-3 py-1.5 glass-card rounded-full flex items-center gap-2 animate-float-2">
                <div class="w-2 h-2 rounded-full bg-secondary-fixed animate-ping"></div>
                <span class="font-label-caps text-label-caps text-on-surface font-semibold">LOCAL CACHE</span>
            </div>
            <div class="absolute bottom-[15%] right-0 px-3 py-1.5 glass-card rounded-full flex items-center gap-2 animate-float-1">
                <span class="material-symbols-outlined text-[14px] text-tertiary animate-pulse">check_circle</span>
                <span class="font-label-caps text-label-caps text-on-surface font-semibold">SYNCED</span>
            </div>
        </div>

        <!-- Typography & Story -->
        <div class="text-center w-full mb-12 animate-fade-in-up-2">
            <h1 class="font-h1 text-h1 text-on-surface mb-4 tracking-tight text-glow leading-tight">
                Offline-First <br/> <span class="text-secondary">Smart Marketplace</span>
            </h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                Trade seamlessly deep in the forest. Your data syncs automatically when you return to coverage.
            </p>
        </div>

        <!-- Controls (Dots & Button) -->
        <div class="w-full flex flex-col items-center gap-8 animate-fade-in-up-3">
            <!-- Premium Progress Dots -->
            <div class="flex gap-3">
                <div class="w-2 h-2 rounded-full bg-surface-dim"></div>
                <div class="w-2 h-2 rounded-full bg-surface-dim"></div>
                <div class="w-8 h-2 rounded-full bg-secondary shadow-[0_0_10px_rgba(0,109,54,0.4)]"></div>
            </div>

            <!-- Get Started CTA -->
            <button id="btn-get-started" class="w-full glass-card btn-glow bg-gradient-to-r from-secondary to-secondary/90 text-on-primary rounded-xl py-4 flex items-center justify-center gap-2 group">
                <span class="font-h2 text-[20px] font-semibold">Get Started</span>
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </button>
        </div>
    </main>

    <script>
        document.getElementById('btn-back').addEventListener('click', () => {
            document.body.classList.add('animate-exit-right');
            setTimeout(() => {
                window.location.href = 'onboarding2.html';
            }, 500);
        });

        document.getElementById('btn-get-started').addEventListener('click', () => {
            localStorage.setItem('onboardingComplete', 'true');
            document.body.classList.add('animate-exit-left');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 500);
        });
    </script>
</body>
</html>
