    <style>
        html, body { background-color: #ffffff !important; background: #ffffff !important; }

        body {
            background-color: transparent;
            margin: 0;
            overflow: hidden;
            min-height: 100dvh;
        }
        .bg-gradient-radial {
            background: transparent;
        }

        /* Premium Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes dotBounce {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            50% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.98); filter: blur(5px); }
        }

        .animate-fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }
        .animate-fade-in-up {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-out {
            animation: fadeOut 0.8s cubic-bezier(0.7, 0, 0.84, 0) forwards;
        }

        .dot-1 {
            animation: dotBounce 1.4s infinite ease-in-out;
        }
        .dot-2 {
            animation: dotBounce 1.4s infinite ease-in-out 0.2s;
        }
        .dot-3 {
            animation: dotBounce 1.4s infinite ease-in-out 0.4s;
        }
    </style>
    <script src="i18n.js" defer></script>    <script src="device-lock.js" defer></script>
</head>
<body class="bg-gradient-radial h-screen w-screen flex flex-col items-center justify-center relative select-none">
    <!-- Background Image with Soft Forest Illustration -->
    <div class="absolute inset-0 z-0 opacity-20 pointer-events-none animate-fade-in" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBwOZZyxJUtzLu7L2AkwI0ZpZJmW0xay47MOrydj8Ob-6zStqrxyp-AfDFhbifCi1e4rOQVKIGW_Tq7ZJAFRzrbAeeNBjx_WDPUJ--WsbbUe1mBAZ0vrvHhOLvEbbTuZtpiC_B1K2s6WCxRzGS_zmvKXLM6Ii5eXzdmO5pMyGmTAxt-s6tkakDaI3Q6nF9JRGeIL5QwoBjwKEs6iRhMR8vSPE03q4kiS5N6KJfjmVlH9if1LoWOFGUToIgzHcxPXg04-Ep_yB-LvSak'); background-size: cover; background-position: center;">
    </div>

    <!-- Central Logo & Glass Overlay -->
    <div id="main-container" class="z-10 flex flex-col items-center justify-center p-card-padding animate-fade-in-up">
        <!-- Glassmorphism Container for Logo -->
        <div class="relative bg-white/60 backdrop-blur-[25px] border border-white/30 rounded-xl p-12 shadow-[0_40px_40px_rgba(0,109,54,0.05)] flex flex-col items-center justify-center">
            <!-- Inner Glow Effect -->
            <div class="absolute inset-0 rounded-xl border-[0.5px] border-white pointer-events-none"></div>
            <img src="app_icon.png" alt="Budakattu Sante Logo" class="w-24 h-24 rounded-2xl mb-6 shadow-[0_10px_25px_rgba(0,109,54,0.15)] animate-bounce" style="animation-duration: 3s;"/>
            <h1 class="font-h1 text-h1 text-on-surface text-center mb-4 relative z-20">
                Budakattu-Sante
            </h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant text-center tracking-wide">
                Forest-to-Home Marketplace
            </p>
        </div>
    </div>

    <!-- Elegant Minimal Loading Animation -->
    <div id="loading-container" class="absolute bottom-section-gap z-10 flex flex-col items-center animate-fade-in" style="animation-delay: 0.3s;">
        <div class="flex space-x-2">
            <div class="w-3 h-3 bg-secondary rounded-full shadow-[0_0_10px_rgba(0,109,54,0.4)] dot-1"></div>
            <div class="w-3 h-3 bg-secondary rounded-full shadow-[0_0_10px_rgba(0,109,54,0.5)] dot-2"></div>
            <div class="w-3 h-3 bg-secondary rounded-full shadow-[0_0_10px_rgba(0,109,54,0.6)] dot-3"></div>
        </div>
        <p class="mt-4 font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest opacity-60">
            Initializing Ecosystem...
        </p>
    </div>

    <script>
        // Check session and onboarding state immediately to prevent visual delay/flicker
        if (localStorage.getItem('userLoggedIn') === 'true') {
            const role = localStorage.getItem('userRole') || 'buyer';
            if (role === 'seller') {
                window.location.replace('seller_dashboard.html');
            } else {
                window.location.replace('discover.html');
            }
        } else if (localStorage.getItem('onboardingComplete') === 'true') {
            window.location.replace('login.html');
        } else {
            // Transition to next screen after 3.5 seconds only if first time
            setTimeout(() => {
                const body = document.body;
                body.classList.add('animate-fade-out');
                
                setTimeout(() => {
                    window.location.href = 'onboarding1.html';
                }, 800); // match animation duration
            }, 3500);
        }
    </script>
</body>
</html>
