                        "surface-container-high": "transparent",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#00743a",

                        "tertiary-container": "#ffffff",
                        "inverse-on-surface": "transparent",
                        "outline": "#747878",
                        "on-background": "#161c22",
                        "error": "#ba1a1a",
                        "surface-container-low": "transparent",
                        "on-primary-fixed-variant": "#454747",

                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#8b7400",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#5d5f5f",
                        "secondary": "#006d36",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#e9c400",

                        "on-primary-container": "#747676",
                    },
                    "spacing": {
                        "gutter": "16px",
                        "unit": "8px",
                        "section-gap": "48px",
                        "container-margin": "24px",
                        "card-padding": "20px"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "h2": ["Epilogue"],
                        "price-display": ["Space Grotesk"],
                        "body-lg": ["Manrope"],
                        "h1": ["Epilogue"],
                        "label-caps": ["Space Grotesk"]
                    },
                    "fontSize": {

                        "price-display": ["24px", { "lineHeight": "1", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1": ["40px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],

    <style>
        html, body { background-color: #ffffff !important; background: #ffffff !important; }

        body {
            min-height: 100dvh;
        }

        /* Entry & Transition Animations */
        @keyframes subtleZoom {
            0% { transform: scale(1.05); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes slideUpFade {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes pageFadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.97); filter: blur(4px); }
        }

        .animate-subtle-zoom {
            animation: subtleZoom 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-slide-up-fade {
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            opacity: 0; /* starts hidden and then animates */
        }
        .animate-exit {
            animation: pageFadeOut 0.6s cubic-bezier(0.7, 0, 0.84, 0) forwards;
        }

        /* Hover Glow Effect */
        .btn-glow {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-glow:hover {
            box-shadow: 0 15px 30px rgba(0, 109, 54, 0.35);
            transform: translateY(-2px);
        }
        .btn-glow:active {
            transform: translateY(0);
        }
    </style>
    <script src="i18n.js" defer></script>    <script src="device-lock.js" defer></script>
</head>
<body class="bg-surface-bright h-[884px] flex flex-col font-body-md text-on-surface overflow-hidden relative selection:bg-secondary-container selection:text-on-secondary-container select-none">
    <!-- Background Illustration Layer -->
    <div class="absolute inset-0 z-0 overflow-hidden">
        <img class="w-full h-[574px] object-cover object-top animate-subtle-zoom" data-alt="An elegant, hyper-realistic 3D illustration representing tribal communities and sustainable forestry, set against a bright, airy background. The scene features ethereal layers of translucent mist and sunlit foliage, utilizing a sophisticated palette of soft emerald greens, pristine whites, and honey gold accents. The overall aesthetic is highly detailed, calm, and technologically advanced, adhering to a premium white glassmorphism style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBf1k8PNp1PJz40lDMCvEy7lp6iLIBCSynxRQypJhIyN4gXBosSYTl3o6vnsxbhn_0LAQ_RUSwS-mcUH-n7kM24-yoeMI263QZx_yxR5OloGSe7cpmnY8FluEbYygJ4wJGYXFHJOJJWNYT1nWRI_tacgsJg6g_AGVD73COPhzqpyTnYCqVK0srSLWa8qL0i9tJu8qgqmenJ4nEw5gIRd6A1U_7OtQe0VEukpVHNHVlEO2GHGA5mMf_H31wxJTLr98kSz6V3hsFNF1oh"/>
        <!-- Refractive Eco-Gradient Overlay -->
        <div class="absolute inset-0 bg-gradient-to-b from-surface-bright/10 via-surface-bright/60 to-surface-bright backdrop-blur-[2px]"></div>
    </div>

    <!-- Main Content Canvas -->
    <main class="relative z-10 flex-1 flex flex-col justify-end px-container-margin pb-section-gap">
        <!-- Floating Glass Content Card -->
        <div class="bg-white/60 backdrop-blur-[30px] border border-white/40 shadow-[0_40px_40px_rgba(0,109,54,0.05)] rounded-[24px] p-container-margin flex flex-col items-center text-center animate-slide-up-fade">
            <h1 class="font-h1 text-h1 text-on-surface mb-unit leading-tight">
                Support Tribal Communities
            </h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant mb-section-gap">
                Connect directly with forest artisans to source authentic, sustainably harvested products while ensuring fair trade practices.
            </p>
            
            <!-- Premium Progress Indicators -->
            <div class="flex items-center space-x-2 mb-gutter">
                <div class="w-8 h-2 rounded-full bg-secondary shadow-[0_0_10px_rgba(0,109,54,0.4)] transition-all duration-300"></div>
                <div class="w-2 h-2 rounded-full bg-surface-variant border border-outline-variant/30"></div>
                <div class="w-2 h-2 rounded-full bg-surface-variant border border-outline-variant/30"></div>
            </div>

            <!-- Soft Emerald Glow Button -->
            <button id="btn-next" class="w-full bg-secondary text-on-secondary font-label-caps text-label-caps py-4 rounded-full relative overflow-hidden group shadow-[0_12px_24px_rgba(0,109,54,0.2)] border border-white/20 btn-glow">
                <span class="relative z-10">Get Started</span>
                <!-- Inner Shine / Glow Effect -->
                <div class="absolute inset-0 rounded-full border border-white/30 pointer-events-none"></div>
                <div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-white/20 to-transparent pointer-events-none"></div>
            </button>
        </div>
    </main>

    <script>
        document.getElementById('btn-next').addEventListener('click', () => {
            document.body.classList.add('animate-exit');
            setTimeout(() => {
                window.location.href = 'onboarding2.html';
            }, 600);
        });
    </script>
</body>
</html>
