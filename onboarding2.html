<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />

    <title>Budakattu-Sante - Onboarding</title>

    <link

        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#ffffff",
                        "on-tertiary-fixed-variant": "#544600",
                        "surface": "transparent",
                        "on-primary-fixed": "#1a1c1c",
                        "tertiary": "#705d00",
                        "on-tertiary-fixed": "#221b00",
                        "on-secondary-fixed": "#00210c",
                        "surface-container-high": "#e3e9f1",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#00743a",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#ffffff",
                        "inverse-on-surface": "#ebf1f9",
                        "outline": "#747878",
                        "on-background": "#161c22",
                        "error": "#ba1a1a",
                        "surface-container-low": "#eef4fc",
                        "on-primary-fixed-variant": "#454747",
                        "primary": "#5d5f5f",
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#8b7400",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#5d5f5f",
                        "secondary": "#006d36",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#e9c400",
                        "secondary-container": "#83fba5",
                        "primary-fixed": "#e2e2e2",
                        "outline-variant": "#c4c7c8",
                        "tertiary-fixed": "#ffe16d",
                        "surface-container": "#e8eef6",
                        "on-surface": "#161c22",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d4dbe2",
                        "primary-fixed-dim": "#c6c6c7",
                        "on-surface-variant": "#444748",
                        "surface-bright": "transparent",
                        "secondary-fixed": "#83fba5",
                        "on-primary-container": "#747676",
                        "inverse-surface": "#2b3137",
                        "inverse-primary": "#c6c6c7",
                        "secondary-fixed-dim": "#66dd8b",
                        "on-secondary-fixed-variant": "#005227",
                        "surface-container-highest": "#dde3eb",
                        "surface-variant": "#dde3eb",
                        "background": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "unit": "8px",
                        "section-gap": "48px",
                        "container-margin": "24px",
                        "card-padding": "20px"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "h2": ["Epilogue"],
                        "price-display": ["Space Grotesk"],
                        "body-lg": ["Manrope"],
                        "h1": ["Epilogue"],
                        "label-caps": ["Space Grotesk"]
                    },
                    "fontSize": {

                        "h2": ["28px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "price-display": ["24px", { "lineHeight": "1", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1": ["40px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background-color: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.5), 0 40px 40px rgba(0, 109, 54, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bg-frosted-nature {
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBGYIA4IQG_VmKCSXtQ2dhEJnKn9VYPWDUSoNJ3kkgA4wMeRPMCZ1GcHrrYjEoO3vkZuAhwLQK07-t1LcvpxKoS9v8u8jf__H535Cpvvx6ExC4ypHqYNc9ckIXWn-ljGtNpIKYVaBPoggQIqM21xGzirQCB-w0jZSgOZsLZJDt3Mnpoivuk-dHhN7g9Yecp793F7EAV1VhVzFZ3O7-wlmlCNOUdKUnOuGxLa_tzLQDxSz5ZYXW-5cf8woEGINu1uEljFx4GTnqsfhvw);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            html, body { background-color: #ffffff !important; background: #ffffff !important; }
        }

        body {
            min-height: 100dvh;
        }

        /* Premium Animations */
        @keyframes subtleZoomBg {
            0% {
                background-size: 110% auto;
            }

            100% {
                background-size: 100% auto;
            }
        }

        @keyframes slideUpFadeIn {
            0% {
                transform: translateY(20px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pageFadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(0.97);
                filter: blur(4px);
            }
        }

        @keyframes pageFadeOutLeft {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(-20px);
            }
        }

        @keyframes pageFadeOutRight {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(20px);
            }
        }

        .animate-enter-1 {
            animation: slideUpFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-enter-2 {
            animation: slideUpFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
            opacity: 0;
        }

        .animate-enter-3 {
            animation: slideUpFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            opacity: 0;
        }

        .animate-exit-left {
            animation: pageFadeOutLeft 0.5s cubic-bezier(0.7, 0, 0.84, 0) forwards;
        }

        .animate-exit-right {
            animation: pageFadeOutRight 0.5s cubic-bezier(0.7, 0, 0.84, 0) forwards;
        }
    </style>
    <script src="i18n.js" defer></script>
    <script src="device-lock.js" defer></script>
</head>

<body class="bg-frosted-nature text-on-surface min-h-screen flex flex-col justify-between overflow-hidden select-none">
    <!-- Top App Bar (Minimalist Back Button for flow) -->
    <header class="w-full px-container-margin py-6 flex items-center justify-start z-50 animate-enter-1">
        <button id="btn-back"
            class="w-12 h-12 rounded-full glass-card flex items-center justify-center text-secondary hover:scale-105 active:scale-95 transition-all duration-300">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
        </button>
    </header>

    <!-- Main Content Canvas -->
    <main
        class="flex-grow flex flex-col items-center justify-center px-container-margin py-section-gap w-full max-w-lg mx-auto relative z-10">
        <!-- Text Content -->
        <div class="text-center mb-12 animate-enter-2">
            <h1 class="font-h1 text-h1 text-secondary mb-4 drop-shadow-sm leading-tight">Buy Authentic Forest Products
            </h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">
                Discover nature's finest. Sustainably sourced wild honey, artisanal bamboo crafts, and pure herbal oils,
                delivered from the forest directly to you.
            </p>
        </div>

        <!-- Floating Glass Cards Layout (Bento-style) -->
        <div class="grid grid-cols-2 gap-4 w-full mb-12 relative animate-enter-3">
            <!-- Card 1: Wild Honey -->
            <div
                class="glass-card rounded-xl p-3 flex flex-col items-center justify-center aspect-square transform -rotate-2 hover:rotate-0 hover:-translate-y-1 hover:shadow-xl transition-all duration-500 relative z-20">
                <img alt="Wild Honey" class="w-full h-3/4 object-cover rounded-lg mb-2 shadow-sm"
                    data-alt="A close-up, high-end macro photograph of a jar of wild, golden honey catching the sunlight. The honey jar rests on a smooth white stone surface, surrounded by subtle, blurred forest foliage in the background. The lighting is soft, ethereal, and bright, fitting a premium, sustainable 'White Glassmorphism' design system. Subtle emerald green reflections highlight the edges."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4LtqudgwMmkZoitDUmPIIpdcjJmhCTkVKnekDtYz26GVp8hrABTlGm0098mXIxwAyPiDnJXr8mi9QYDoruOkwg_ibK_ZkPGcLEkqW0VKubYbqQfIVOrO6PE2SNE4mEas-Ua-l4tyQQr54QaaUsjN9yhAaZ-rxmZSucSAUKOqWwhtjwBqck1bx4lRvETE8EfvkJkKFE3T5Eor7XPrIjuoly-hm2OUgH3muogV-eLjWQDHWgS0juhAdzDXN2Eewz2QS7onCfPNfAIxD" />
                <span class="font-label-caps text-label-caps text-tertiary font-semibold">WILD HONEY</span>
            </div>

            <!-- Card 2: Bamboo Crafts -->
            <div
                class="glass-card rounded-xl p-3 flex flex-col items-center justify-center aspect-square transform translate-y-6 rotate-3 hover:rotate-0 hover:-translate-y-1 hover:shadow-xl transition-all duration-500 relative z-10">
                <img alt="Bamboo Crafts" class="w-full h-3/4 object-cover rounded-lg mb-2 shadow-sm"
                    data-alt="A beautifully crafted, minimalist bamboo basket and a set of wooden utensils placed on a pristine white marble surface. Soft, dappled sunlight filters from above, creating elegant shadows. The background is a soft, frosted white with hints of muted green tones, aligning with an ultra-premium eco-commerce visual language."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1wZXEQ3qOd1ZZD5RxzYanPUhqpDicpTwy2rwWzTgeL2LQsw5kN4p-oqa1hd_3wossf90DHwuioYHtFaftuy-elBwAbVd2ypEvSVX16qOkJbMeX4KIgVNjwAO7ut8Dw9RHiLfGzzU9Q8H4-nrrdctXlJs-5vSgksR1_mMMAvoEnvbbKlzFJpo3HDHNwJ9B9KlpZOtw0jHfwEiCxLlvkI9HYgTbJPnacCTXW_4TaL0ugxja1AqHioeTMkz6YiTID-8vIQu0xzSOKnVu" />
                <span class="font-label-caps text-label-caps text-secondary font-semibold">BAMBOO</span>
            </div>

            <!-- Card 3: Herbal Oils (Spanning full width) -->
            <div
                class="glass-card col-span-2 rounded-xl p-4 flex items-center space-x-4 mt-2 transform scale-95 hover:scale-100 hover:shadow-xl transition-all duration-500 z-30">
                <img alt="Herbal Oils" class="w-20 h-20 object-cover rounded-lg shadow-sm"
                    data-alt="Small, luxurious amber glass bottles containing herbal essential oils, arranged on a sleek, frosted glass table. A single delicate green fern leaf lies next to the bottles. The lighting is incredibly clean and bright, utilizing a high-key light mode setup. The overall atmosphere is pure, calming, and highly sophisticated."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOikkMRRjBkilc8T-bGLw-SzLEaxPPzfjDMtDLROCcsvgRSjoRQF3n3UGs97ioq_ELpWiQKYv1HUWgXpJkfw4cDcEHhgh0r1B_Iy8jGxdFkpMatjF5TR49VkMpc_k-sgl1Q6zUTVBEc4WQxsouHS9PapaCHiyQJ4qhDcs2kqo-wjh6TGV7LFdfny64h1IqKdKu6kBBwoGp0lgjmaa6MapxB2nVVrm58qKhH7FOzPzXYEwhy_f0AuZCAJwv7HNOyhHBIQgEmp2EWNs2" />
                <div class="flex-grow">
                    <span class="font-label-caps text-label-caps text-primary mb-1 block">PURE EXTRACTS</span>
                    <h3 class="font-body-lg text-body-lg font-bold text-on-surface">Herbal Oils &amp; Balms</h3>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation / Action Area -->
    <footer class="w-full px-container-margin pb-12 pt-6 flex flex-col items-center z-50 animate-enter-3">
        <!-- Premium Horizontal Progress Indicator -->
        <div class="flex items-center space-x-3 mb-8">
            <div class="w-2 h-2 rounded-full bg-surface-dim"></div>
            <div class="w-8 h-2 rounded-full bg-secondary shadow-[0_0_10px_rgba(0,109,54,0.5)]"></div>
            <div class="w-2 h-2 rounded-full bg-surface-dim"></div>
        </div>

        <!-- Action Button -->
        <button id="btn-continue"
            class="w-full max-w-sm py-4 rounded-full bg-gradient-to-r from-secondary to-secondary-container text-on-secondary font-h2 text-body-lg font-bold shadow-[0_20px_40px_rgba(0,109,54,0.2)] hover:scale-[1.02] active:scale-95 transition-all duration-300 relative overflow-hidden group">
            <span class="relative z-10">Continue</span>
            <!-- Inner Shine Effect -->
            <div
                class="absolute inset-0 bg-gradient-to-t from-transparent to-white/20 opacity-0 group-hover:opacity-100 transition-opacity">
            </div>
        </button>
    </footer>

    <script>
        document.getElementById('btn-back').addEventListener('click', () => {
            document.body.classList.add('animate-exit-right');
            setTimeout(() => {
                window.location.href = 'onboarding1.html';
            }, 500);
        });

        document.getElementById('btn-continue').addEventListener('click', () => {
            document.body.classList.add('animate-exit-left');
            setTimeout(() => {
                window.location.href = 'onboarding3.html';
            }, 500);
        });
    </script>
</body>

</html>
